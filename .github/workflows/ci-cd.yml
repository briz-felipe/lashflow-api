name: CI/CD

on:
  push:
    branches: [main, dev]   # roda CI em ambas
  pull_request:
    branches: [main]        # testes obrigatórios em todo PR → main

jobs:
  # ─── TESTES ────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short

      - name: Run e2e tests
        run: pytest tests/e2e/ -v --tb=short

  # ─── VERSIONING + DEPLOY (só no push para main) ────────────────────────────
  deploy:
    name: Deploy
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Calcula próxima versão com base no commit message ──────────────────
      # Regras:
      #   major (1.0.0) → commit contém "BREAKING CHANGE", "major:" ou "refactor!:"
      #   minor (0.1.0) → commit começa com "feat:" ou "feature:"
      #   patch (0.0.1) → qualquer outro commit (fix:, chore:, docs:, etc.)
      - name: Calculate next version
        id: version
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          echo "Last tag: $LAST_TAG"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_TAG"
          MAJOR=${MAJOR:-0}; MINOR=${MINOR:-0}; PATCH=${PATCH:-0}

          if echo "$COMMIT_MSG" | grep -qiE "(BREAKING CHANGE|major:|refactor!:|feat!:)"; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
            BUMP_TYPE="major"
          elif echo "$COMMIT_MSG" | grep -qiE "^(feat|feature):"; then
            MINOR=$((MINOR + 1)); PATCH=0
            BUMP_TYPE="minor"
          else
            PATCH=$((PATCH + 1))
            BUMP_TYPE="patch"
          fi

          NEW_TAG="$MAJOR.$MINOR.$PATCH"
          echo "new_tag=$NEW_TAG"         >> $GITHUB_OUTPUT
          echo "last_tag=$LAST_TAG"       >> $GITHUB_OUTPUT
          echo "bump_type=$BUMP_TYPE"     >> $GITHUB_OUTPUT

      # ── Cria e faz push da tag ──────────────────────────────────────────────
      - name: Create git tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.new_tag }}
          git push origin ${{ steps.version.outputs.new_tag }}

      # ── SSH no servidor e rebuild ───────────────────────────────────────────
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/projects/lashflow-api
            git pull origin main
            docker compose up --build -d
            docker system prune -f --volumes=false

      # ── Resumo do deploy ────────────────────────────────────────────────────
      - name: Deploy summary
        run: |
          BUMP="${{ steps.version.outputs.bump_type }}"
          case "$BUMP" in
            major) BUMP_LABEL="Major (arquitetura / refatoração geral)" ;;
            minor) BUMP_LABEL="Minor (nova funcionalidade)" ;;
            *)     BUMP_LABEL="Patch (correção / ajuste pequeno)" ;;
          esac

          {
            echo "## Deploy concluído"
            echo ""
            echo "| Campo | Valor |"
            echo "|-------|-------|"
            echo "| Versão anterior | \`${{ steps.version.outputs.last_tag }}\` |"
            echo "| Nova versão | \`${{ steps.version.outputs.new_tag }}\` |"
            echo "| Tipo de bump | $BUMP_LABEL |"
            echo "| Commit | ${{ github.event.head_commit.message }} |"
            echo "| Autor | ${{ github.event.head_commit.author.name }} |"
            echo "| SHA | \`${{ github.sha }}\` |"
            echo ""
            echo "> Deploy realizado em \`${{ vars.SSH_HOST }}:8000\`"
          } >> $GITHUB_STEP_SUMMARY
